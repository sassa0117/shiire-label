<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#c8704b">
<title>スワイプ仕分け 試作</title>
<style>
:root{--bg:#f7f5f1;--card:#fff;--line:#e7e2d8;--text:#2a2723;--sub:#8a8578;--accent:#c8704b;--ok:#5a8a3c;--ng:#b5563e}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;max-width:560px;margin:0 auto}
.demo{font-size:11px;color:var(--sub);text-align:center;padding:5px;background:#efe9df}
header{padding:8px 10px 4px}
.stores{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px}
.stores::-webkit-scrollbar{display:none}
.st{flex:0 0 auto;padding:8px 14px;border:1px solid var(--line);border-radius:999px;background:var(--card);font-size:13px;font-weight:700;color:var(--sub);white-space:nowrap;cursor:pointer}
.st.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.now{font-size:12px;color:var(--sub);font-weight:700;padding:2px 2px 0}
.now b{color:var(--accent)}
.count{text-align:center;font-size:12px;color:var(--sub);font-weight:700;padding:4px 0 2px}
.stage{flex:1;position:relative;overflow:hidden}
.card{position:absolute;inset:12px;background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,.08);display:flex;flex-direction:column;overflow:hidden;touch-action:none;will-change:transform}
.card img{width:100%;flex:1;object-fit:contain;background:#ece7dc;min-height:0}
.card .meta{padding:12px 14px 16px}
.card .nm{font-size:16px;font-weight:600;line-height:1.4}
.card .pr{font-size:15px;color:var(--ok);font-weight:800;margin-top:6px}
.stamp{position:absolute;top:24px;padding:6px 14px;border-radius:10px;font-size:22px;font-weight:900;opacity:0;border:3px solid}
.stamp.yes{left:22px;color:var(--ok);border-color:var(--ok);transform:rotate(-12deg)}
.stamp.no{right:22px;color:var(--ng);border-color:var(--ng);transform:rotate(12deg)}
.empty{position:absolute;inset:12px;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--sub);font-size:15px;padding:30px}
.undo{position:absolute;top:10px;right:12px;font-size:12px;color:var(--sub);background:var(--card);border:1px solid var(--line);border-radius:999px;padding:5px 12px;cursor:pointer;z-index:5}
footer{display:flex;gap:10px;padding:10px 12px 18px}
.btn{flex:1;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:800;color:#fff;cursor:pointer}
.btn.skip{background:var(--sub)}
.btn.put{background:var(--accent)}
</style>
</head>
<body>
<div class="demo">🧪 スワイプ仕分け 試作（サンプル16件・保存しません）</div>
<header>
  <div class="stores" id="stores"></div>
  <div class="now" id="now"></div>
</header>
<div class="count" id="count"></div>
<div class="stage" id="stage"><div class="undo" id="undo">↩ 取り消し</div></div>
<footer>
  <button class="btn skip" id="skip">← スキップ</button>
  <button class="btn put" id="put">この店に入れる →</button>
</footer>
<script>
const CARDS = [{"id":"wp-5628-h2-0","name":"ラブライブ サンシャイン Aqours 沼津 アニふるくじ国木田花丸 アクスタ","img":"https://sedorisassa.com/wp-content/uploads/2026/04/21.jpg","profit":1843},{"id":"wp-5628-h2-1","name":"Ave Mujica 2nd LIVE アクスタ 三角初華 ドロリス","img":"https://sedorisassa.com/wp-content/uploads/2026/04/9.jpg","profit":1440},{"id":"wp-5628-h2-2","name":"一番くじ 銀魂 銀時 フィギュア ラスト","img":"https://sedorisassa.com/wp-content/uploads/2026/04/8.jpg","profit":2792},{"id":"wp-5623-h2-3","name":"アイマイナ BIG ぬいぐるみ ラウンドワン","img":"https://sedorisassa.com/wp-content/uploads/2026/04/18.jpg","profit":1713},{"id":"wp-5623-h2-4","name":"HOTONE CHOIR ギター エフェクター","img":"https://sedorisassa.com/wp-content/uploads/2026/04/10.jpg","profit":4750},{"id":"wp-5623-h2-5","name":"ARABIA パラティッシ イエロー ティーカップ&ソーサー 2客セット","img":"https://sedorisassa.com/wp-content/uploads/2026/04/6.jpg","profit":2830},{"id":"wp-5623-h2-6","name":"【極美品】I-O DATA CDレコ6 CD-6WK","img":"https://sedorisassa.com/wp-content/uploads/2026/04/16.jpg","profit":3685},{"id":"wp-5623-h2-7","name":"烈車戦隊トッキュウジャー DXシールドレッシャー","img":"https://sedorisassa.com/wp-content/uploads/2026/04/25.jpg","profit":1672},{"id":"wp-5623-h2-8","name":"騎士竜戦隊リュウソウジャー DX モサチェンジャー & モサブレード","img":"https://sedorisassa.com/wp-content/uploads/2026/04/17.jpg","profit":1975},{"id":"wp-5623-h2-9","name":"手裏剣戦隊ニンニンジャー DXライオンハオー","img":"https://sedorisassa.com/wp-content/uploads/2026/04/名称未設定のデザイン-3.jpg","profit":5100},{"id":"wp-5623-h2-10","name":"となりのトトロ ぬいぐるみ 森からのおくりもの サンアロー","img":"https://sedorisassa.com/wp-content/uploads/2026/04/23.jpg","profit":29770},{"id":"wp-5623-h2-11","name":"ジャンプ50周年 フィギュア こち亀 両津勘吉","img":"https://sedorisassa.com/wp-content/uploads/2026/04/5.jpg","profit":2930},{"id":"wp-5623-h2-12","name":"ポケモン 初代 ピカチュウ おしゃべり ぬいぐるみ TOMY","img":"https://sedorisassa.com/wp-content/uploads/2026/04/22.jpg","profit":8200},{"id":"wp-5623-h2-13","name":"Canon 純正インクカートリッジ BC-341XL/BC-340XL 2個セット","img":"https://sedorisassa.com/wp-content/uploads/2026/04/11.jpg","profit":2010},{"id":"wp-5623-h2-14","name":"葬送のフリーレン ゆるパレット 缶バッジ フリーレン","img":"https://sedorisassa.com/wp-content/uploads/2026/04/15.jpg","profit":4040},{"id":"wp-5623-h2-15","name":"葬送のフリーレン ゆるパレット ヒンメル 缶バッジ","img":"https://sedorisassa.com/wp-content/uploads/2026/04/14.jpg","profit":3270}];
const STORES = ["ハードオフ","オフハウス","セカスト","ブックオフ","お宝系","駿河屋"];
const $ = id => document.getElementById(id);
const money = n => "¥" + (n||0).toLocaleString();
let store = STORES[0];
let idx = 0;
let assign = {};
let history = [];
let card = null;

function renderStores(){
  const el = $("stores"); el.innerHTML = "";
  STORES.forEach(s => {
    const b = document.createElement("div");
    b.className = "st" + (s===store ? " on" : "");
    b.textContent = s;
    b.onclick = () => { store = s; renderStores(); renderNow(); renderCount(); };
    el.appendChild(b);
  });
}
function renderNow(){ $("now").innerHTML = 'いま振り分ける店：<b>'+store+'</b>　右で入れる／左でスキップ'; }
function renderCount(){
  const done = Object.values(assign).filter(v => v===store).length;
  $("count").textContent = store + "：" + done + "件入れた ／ 残り" + Math.max(0, CARDS.length-idx) + "枚";
}
function showCard(){
  if(card){ card.remove(); card = null; }
  const old = $("stage").querySelector(".empty"); if(old) old.remove();
  if(idx >= CARDS.length){
    const e = document.createElement("div"); e.className = "empty";
    e.innerHTML = "この束は終わり 🎉<br>店を変えるか、取り消しで戻れます";
    $("stage").appendChild(e); renderCount(); return;
  }
  const p = CARDS[idx];
  const c = document.createElement("div"); c.className = "card";
  const img = document.createElement("img"); img.src = p.img; img.onerror = () => { img.style.display = "none"; };
  const meta = document.createElement("div"); meta.className = "meta";
  meta.innerHTML = '<div class="nm">'+p.name+'</div><div class="pr">利益 '+money(p.profit)+'</div>';
  const yes = document.createElement("div"); yes.className = "stamp yes"; yes.textContent = "入れる";
  const no = document.createElement("div"); no.className = "stamp no"; no.textContent = "スキップ";
  c.appendChild(img); c.appendChild(meta); c.appendChild(yes); c.appendChild(no);
  $("stage").appendChild(c); card = c; bindSwipe(c, yes, no); renderCount();
}
function bindSwipe(c, yes, no){
  let sx=0, dx=0, drag=false;
  c.addEventListener("pointerdown", e => { drag=true; sx=e.clientX; c.setPointerCapture(e.pointerId); c.style.transition="none"; });
  c.addEventListener("pointermove", e => {
    if(!drag) return; dx = e.clientX - sx;
    c.style.transform = "translate("+dx+"px,"+(Math.abs(dx)/12)+"px) rotate("+dx/18+"deg)";
    yes.style.opacity = Math.max(0, dx/120); no.style.opacity = Math.max(0, -dx/120);
  });
  const end = () => {
    if(!drag) return; drag=false; c.style.transition = "transform .28s ease, opacity .28s";
    if(dx > 90) fly(1); else if(dx < -90) fly(-1);
    else { c.style.transform=""; yes.style.opacity=0; no.style.opacity=0; }
  };
  c.addEventListener("pointerup", end); c.addEventListener("pointercancel", end);
}
function fly(dir){
  const p = CARDS[idx]; history.push({ idx: idx, prev: assign[p.id] });
  if(dir > 0) assign[p.id] = store; else if(assign[p.id]===store) delete assign[p.id];
  if(card){ card.style.transform = "translate("+(dir*600)+"px,60px) rotate("+(dir*30)+"deg)"; card.style.opacity = "0"; }
  idx++; setTimeout(showCard, 170);
}
$("put").onclick = () => { if(idx < CARDS.length) fly(1); };
$("skip").onclick = () => { if(idx < CARDS.length) fly(-1); };
$("undo").onclick = () => {
  if(!history.length) return; const h = history.pop(); idx = h.idx; const p = CARDS[idx];
  if(h.prev === undefined) delete assign[p.id]; else assign[p.id] = h.prev; showCard();
};
renderStores(); renderNow(); showCard();
</script>
</body>
</html>
