<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light only">
<title>仕入れラベル</title>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  :root{ color-scheme:light only;
    --bg:#f7f5f0; --card:#fff; --ink:#2a2723; --sub:#8a8278; --line:#e6e1d6;
    --accent:#c8704b; --accent-d:#a85530; --ok:#6a9b46; --okbg:#eef3e6; --okline:#dbe6cd; --unset:#b6ad9e; }
  html,body{ margin:0; background:#efece4; color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif; font-size:15px; line-height:1.5; }
  .demo-note{ text-align:center; font-size:11px; color:var(--sub); padding:8px 12px 4px; }
  .demo-note a{ color:var(--accent-d); cursor:pointer; }
  .phone{ max-width:400px; margin:6px auto 24px; background:var(--bg); border:1px solid #d9d3c7;
    border-radius:22px; overflow:hidden; display:flex; flex-direction:column; min-height:640px; }

  header{ padding:12px 12px 0; }
  .hd{ display:flex; align-items:center; gap:8px; padding:9px 12px; background:var(--card);
    border:1px solid var(--line); border-radius:12px; }
  .arrows{ font-size:13px; color:var(--sub); letter-spacing:2px; }
  .sel{ flex:1; font-size:13px; color:var(--sub); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sel b{ color:var(--ink); }
  .menu{ font-size:20px; cursor:pointer; padding:0 2px; }
  .menu.on{ color:var(--accent); }

  .axis{ display:flex; gap:6px; margin:10px 12px 0; }
  .axis button{ flex:1; padding:7px 4px; border-radius:9px; border:1px solid var(--line); background:var(--card);
    color:var(--sub); font-size:12px; font-weight:600; font-family:inherit; cursor:pointer; }
  .axis button.on{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .axis .cnt{ display:block; font-size:10px; font-weight:700; margin-top:1px; opacity:.9; }

  .tiles{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:11px 12px 4px; }
  .tile{ position:relative; aspect-ratio:1/1; border-radius:15px; background:var(--card); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; text-align:center; font-size:12px; font-weight:600;
    color:var(--ink); line-height:1.2; padding:3px; cursor:pointer; }
  .tile.sel{ background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 2px 8px rgba(200,112,75,.3); }
  .tile.add{ color:var(--accent-d); border-style:dashed; font-weight:700; }
  .tile.wiggle{ animation:wig .3s infinite; }
  @keyframes wig{ 0%{transform:rotate(-1.2deg)} 50%{transform:rotate(1.2deg)} 100%{transform:rotate(-1.2deg)} }
  .tile .x{ position:absolute; top:-6px; left:-6px; width:20px; height:20px; border-radius:50%; background:#c0392b;
    color:#fff; font-size:13px; display:flex; align-items:center; justify-content:center; border:2px solid var(--bg); }
  .tile.dragover{ outline:2px dashed var(--accent); outline-offset:2px; }

  .assign{ margin:8px 12px 0; font-size:12px; padding:7px 11px; border-radius:9px; }
  .assign.has{ color:#3d5228; background:var(--okbg); border:1px solid var(--okline); }
  .assign.no{ color:var(--sub); background:#f1eee7; border:1px dashed var(--line); }
  .assign b{ color:#2f4020; }

  .prog{ display:flex; align-items:center; gap:8px; margin:10px 12px 0; font-size:11px; color:var(--sub); font-weight:700; }
  .bar{ flex:1; height:7px; border-radius:99px; background:var(--line); overflow:hidden; }
  .bar i{ display:block; height:100%; background:var(--ok); transition:width .25s; }

  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:10px 12px 12px; }
  .pc{ position:relative; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:7px;
    text-align:center; cursor:pointer; transition:transform .06s; }
  .pc:active{ transform:scale(.97); }
  .pc.done{ border-color:var(--accent); background:#fbf3ee; }
  .pc .th{ width:100%; height:74px; border-radius:8px; background:#ece7dc; object-fit:contain;
    display:block; margin-bottom:5px; }
  .pc .thx{ width:100%; height:74px; border-radius:8px; background:#ece7dc; display:flex; align-items:center;
    justify-content:center; color:var(--unset); font-size:10px; margin-bottom:5px; }
  .pc .nm{ font-size:11px; font-weight:500; line-height:1.3; height:29px; overflow:hidden; }
  .pc .pr{ font-size:11px; color:var(--ok); font-weight:700; margin-top:2px; }
  .pc .ck{ position:absolute; top:5px; right:5px; min-width:20px; height:20px; padding:0 5px; border-radius:99px;
    background:var(--accent); color:#fff; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:2px; }
  .pc .val{ margin-top:4px; font-size:10px; font-weight:700; color:#fff; background:var(--accent);
    border-radius:99px; padding:1px 7px; display:inline-block; }

  .empty{ grid-column:1/-1; text-align:center; color:var(--sub); padding:30px 10px; font-size:13px; }

  footer{ margin-top:auto; }
  .confirm-wrap{ padding:10px 12px; background:linear-gradient(transparent,rgba(0,0,0,.02)); }
  .confirm{ width:100%; padding:13px; border-radius:12px; border:none; background:var(--accent); color:#fff;
    font-size:15px; font-weight:700; font-family:inherit; cursor:pointer; }
  .confirm:disabled{ background:#d8cfc4; color:#fff; cursor:default; }
  .confirm:active:not(:disabled){ background:var(--accent-d); }
  .nav{ display:flex; background:var(--card); border-top:1px solid var(--line); }
  .nav>div{ flex:1; text-align:center; padding:7px 2px 10px; font-size:10px; color:var(--sub); font-weight:600; }
  .nav>div .i{ font-size:17px; line-height:1.35; }
  .nav>div.on{ color:var(--accent); }
  .nav>div.tbd{ color:#c9c2b5; } .nav>div.tbd .i{ color:#d9d3c7; }

  .toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); opacity:0;
    background:#2a2723; color:#fff; font-size:13px; padding:9px 16px; border-radius:99px; pointer-events:none;
    transition:.25s; z-index:50; }
  .toast.on{ opacity:1; transform:translateX(-50%) translateY(0); }
  .hint{ font-size:10px; color:var(--sub); text-align:center; padding:2px 12px 0; }
</style>
</head>
<body>
<div class="phone">
  <header>
    <div class="hd">
      <span class="arrows">←&nbsp;→</span>
      <span class="sel" id="selbar"></span>
      <span class="menu" id="menuBtn" title="クイック設定（並び替え・名称編集）">≡</span>
    </div>
    <div class="axis" id="axis"></div>
    <div class="hint" id="editHint" style="display:none">✏️ 編集モード：ドラッグで並び替え・ダブルタップで改名・✕で削除</div>
  </header>

  <div class="tiles" id="tiles"></div>
  <div class="assign" id="assign"></div>
  <div class="prog"><div class="bar"><i id="bar"></i></div><span id="progtxt"></span></div>
  <div class="grid" id="grid"></div>

  <footer>
    <div class="confirm-wrap">
      <button class="confirm" id="confirm" disabled>確定（付けた分を移動）</button>
    </div>
    <div class="nav">
      <div class="on"><div class="i">✏️</div>入力</div>
      <div><div class="i">🔍</div>検索</div>
      <div class="tbd"><div class="i">・</div>未定</div>
      <div class="tbd"><div class="i">・</div>未定</div>
      <div><div class="i">⚙️</div>設定</div>
    </div>
  </footer>
</div>
<div class="toast" id="toast"></div>

/* IndexedDB（既存アプリと同一: DB=stockLabelDB / store=labels / key=productId ＝互換・サーバー不要） */
const _DB='stockLabelDB',_V=3,_ST='labels';
const _db=new Promise((rs,rj)=>{const r=indexedDB.open(_DB,_V);r.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(_ST))d.createObjectStore(_ST,{keyPath:'productId'});};r.onsuccess=()=>rs(r.result);r.onerror=()=>rj(r.error);});
function _all(){return _db.then(d=>new Promise((rs,rj)=>{const t=d.transaction(_ST,'readonly').objectStore(_ST).getAll();t.onsuccess=()=>rs(t.result||[]);t.onerror=()=>rj(t.error);}));}
function _put(x){return _db.then(d=>new Promise((rs,rj)=>{const t=d.transaction(_ST,'readwrite');t.objectStore(_ST).put(x);t.oncomplete=rs;t.onerror=()=>rj(t.error);}));}
function _del(id){return _db.then(d=>new Promise((rs,rj)=>{const t=d.transaction(_ST,'readwrite');t.objectStore(_ST).delete(id);t.oncomplete=rs;t.onerror=()=>rj(t.error);}));}
function persist(id){ const c=COMMIT[id]||{}; const rec={productId:id,store:c.store||'',shelf:c.shelf||'',genre:c.genre||'',note:c.note||'',updatedAt:Date.now()};
  if(!rec.store&&!rec.shelf&&!rec.genre&&!rec.note){ delete COMMIT[id]; return _del(id); } return _put(rec); }

function renderSel(){
  const a=AXES.find(x=>x.key===axis);
  $('selbar').innerHTML = curVal[axis] ? `${a.label}：<b>${curVal[axis]}</b>` : `🔍 入力するラベルを選択（${a.label}）`;
}
function renderTiles(){
  const el=$('tiles'); el.innerHTML='';
  OPTS[axis].forEach((name,idx)=>{
    const t=document.createElement('div');
    t.className='tile'+(curVal[axis]===name?' sel':'')+(editMode?' wiggle':'');
    t.textContent=name;
    if(editMode){
      t.draggable=true;
      t.ondragstart=e=>{ e.dataTransfer.setData('i',idx); };
      t.ondragover=e=>{ e.preventDefault(); t.classList.add('dragover'); };
      t.ondragleave=()=>t.classList.remove('dragover');
      t.ondrop=e=>{ e.preventDefault(); t.classList.remove('dragover'); const from=+e.dataTransfer.getData('i');
        const arr=OPTS[axis]; const [m]=arr.splice(from,1); arr.splice(idx,0,m); save(); renderTiles(); };
      t.ondblclick=()=>{ const nv=prompt('名称編集',name); if(nv&&nv.trim()){ OPTS[axis][idx]=nv.trim(); save(); renderAll(); } };
      const x=document.createElement('div'); x.className='x'; x.textContent='×';
      x.onclick=e=>{ e.stopPropagation(); OPTS[axis].splice(idx,1); save(); renderTiles(); };
      t.appendChild(x);
    } else {
      t.onclick=()=>{ curVal[axis]=curVal[axis]===name?null:name; renderAll(); };
    }
    el.appendChild(t);
  });
  const add=document.createElement('div'); add.className='tile add'; add.textContent='＋ 追加';
  add.onclick=()=>{ const nv=prompt('新しい選択肢を追加'); if(nv&&nv.trim()){ OPTS[axis].unshift(nv.trim()); save(); renderAll(); } };
  el.appendChild(add);
}
function renderAssign(){
  const el=$('assign');
  if(curVal[axis]){ el.className='assign has'; el.innerHTML=`いま割り当てる値：<b>${curVal[axis]}</b>　タップで付く／長押しで外す`; }
  else{ el.className='assign no'; el.textContent='↑ まず付けたい値のタイルを選んでください'; }
}
function renderProg(){
  const done=countDone(axis), tot=PRODUCTS.length;
  $('bar').style.width=(tot?done/tot*100:0)+'%';
  $('progtxt').textContent=`${done} / ${tot}`;
}
function visible(p){ const c=COMMIT[p.id]&&COMMIT[p.id][axis]; return !c || keep.has(p.id); }
function renderGrid(){
  const el=$('grid'); el.innerHTML='';
  const list=PRODUCTS.filter(visible);
  if(!list.length){ el.innerHTML='<div class="empty">この軸は全部つきました 🎉<br>（未設定は0件）</div>'; return; }
  list.forEach(p=>{
    const c=COMMIT[p.id]&&COMMIT[p.id][axis];
    const card=document.createElement('div');
    card.className='pc'+(c?' done':'');
    const mgn=(p.sell>0)?Math.round(p.profit/p.sell*100):null;
    card.innerHTML=`
      <img class="th" src="${p.img}" loading="lazy" onerror="this.outerHTML='<div class=&quot;thx&quot;>画像なし</div>'">
      <div class="nm">${p.name}</div>
      <div class="pr">利益${fmt(p.profit)}${mgn!=null?`（${mgn}%）`:''}</div>
      ${c?`<div class="ck">✓</div><div class="val">${c}</div>`:''}`;
    // タップ＝付与（値がその場で確定・残る） / 長押し＝外す
    let timer=null, longed=false;
    const down=()=>{ longed=false; timer=setTimeout(()=>{ longed=true; unset(p); }, 500); };
    const up=()=>{ clearTimeout(timer); };
    card.addEventListener('pointerdown',down);
    card.addEventListener('pointerup',up);
    card.addEventListener('pointerleave',up);
    card.addEventListener('click',()=>{ if(longed){ longed=false; return; } tapCard(p); });
    el.appendChild(card);
  });
}
function tapCard(p){
  if(!curVal[axis]){ toast('先に上のタイルで値を選んでね'); return; }
  COMMIT[p.id]=COMMIT[p.id]||{}; COMMIT[p.id][axis]=curVal[axis];
  keep.add(p.id); persist(p.id);
  renderAxis(); renderProg(); renderGrid(); updateConfirm();
}
function unset(p){
  if(!(COMMIT[p.id]&&COMMIT[p.id][axis])) return;
  delete COMMIT[p.id][axis]; keep.delete(p.id); persist(p.id);
  toast('✓ を外しました');
  renderAxis(); renderProg(); renderGrid(); updateConfirm();
}
function updateConfirm(){
  const n=[...keep].filter(id=>COMMIT[id]&&COMMIT[id][axis]).length;
  const b=$('confirm'); b.disabled=n===0; b.textContent=n?`確定（${n}件を移動）`:'確定（付けた分を移動）';
}
function doConfirm(){
  const n=[...keep].filter(id=>COMMIT[id]&&COMMIT[id][axis]).length;
  if(!n) return;
  keep.clear();
  renderGrid(); updateConfirm();
  toast(`${n}件を移動しました`);
}
function renderAll(){ renderAxis(); renderSel(); renderTiles(); renderAssign(); renderProg(); renderGrid(); updateConfirm(); }

$('menuBtn').onclick=()=>{ editMode=!editMode; $('menuBtn').classList.toggle('on',editMode);
  $('editHint').style.display=editMode?'block':'none'; renderTiles(); };
$('confirm').onclick=doConfirm;
(async function boot(){
  try{
    const rows = await _all();
    if(rows.length===0){
      const d=await _db;
      await new Promise((rs,rj)=>{ const t=d.transaction(_ST,'readwrite'); const os=t.objectStore(_ST);
        for(const id in SEED){ const s=SEED[id]; os.put({productId:id,store:s.store||'',shelf:s.shelf||'',genre:s.genre||'',note:s.note||'',updatedAt:0});
          COMMIT[id]={store:s.store||'',shelf:s.shelf||'',genre:s.genre||'',note:s.note||''}; }
        t.oncomplete=rs; t.onerror=()=>rj(t.error); });
    } else {
      for(const r of rows){ COMMIT[r.productId]={store:r.store||'',shelf:r.shelf||'',genre:r.genre||'',note:r.note||''}; }
    }
  }catch(e){ console.error(e); }
  renderAll();
})();
</script>
</body>
