<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#c8704b">
<title>仕入れラベル</title>
<style>
  :root { --bg:#f7f5f1; --card:#fff; --line:#e7e2d8; --text:#2a2723; --ink:#2a2723; --sub:#8a8578;
    --accent:#c8704b; --accent-d:#a85838; --ok:#5a8a3c; --okbg:#eef4e6; --okline:#cfe0bd; --unset:#b8b2a4; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body { font-family:-apple-system,"Hiragino Kaku Gothic ProN",sans-serif; background:var(--bg); color:var(--text);
    display:flex; flex-direction:column; max-width:560px; margin:0 auto; overscroll-behavior:none; }
  header { position:sticky; top:0; z-index:10; background:var(--bg); border-bottom:1px solid var(--line); }
  .hd { display:flex; align-items:center; gap:8px; padding:10px 12px 6px; }
  .hd .ttl { font-size:15px; font-weight:800; }
  .hd .sel { flex:1; font-size:12px; color:var(--sub); font-weight:700; text-align:right; }
  .hd .menu { font-size:20px; width:34px; height:34px; display:flex; align-items:center; justify-content:center;
    border-radius:9px; border:1px solid var(--line); background:var(--card); cursor:pointer; }
  .axis { display:flex; gap:6px; padding:2px 12px 10px; }
  .axbtn { flex:1; padding:8px 4px; border:1px solid var(--line); border-radius:10px; background:var(--card);
    font-size:13px; font-weight:700; color:var(--sub); cursor:pointer; text-align:center; }
  .axbtn.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  .axbtn .cnt { display:block; font-size:10px; font-weight:700; margin-top:1px; opacity:.9; }
  .editHint { font-size:10px; color:var(--sub); text-align:center; padding:0 12px 6px; }

  main { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .tiles{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; padding:11px 12px 4px; }
  .tile{ position:relative; aspect-ratio:2.4/1; border-radius:13px; background:var(--card); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; text-align:center; font-size:12px; font-weight:600;
    color:var(--ink); line-height:1.2; padding:3px; cursor:pointer; }
  .tile.sel{ background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 2px 8px rgba(200,112,75,.3); }
  .tile.add{ color:var(--accent-d); border-style:dashed; font-weight:700; }
  .tile.wiggle{ animation:wig .3s infinite; }
  @keyframes wig{ 0%{transform:rotate(-1deg)} 50%{transform:rotate(1deg)} 100%{transform:rotate(-1deg)} }
  .tile .x{ position:absolute; top:-6px; left:-6px; width:20px; height:20px; border-radius:50%; background:#c0392b;
    color:#fff; font-size:13px; display:flex; align-items:center; justify-content:center; border:2px solid var(--bg); }
  .tile.dragover{ outline:2px dashed var(--accent); outline-offset:2px; }

  .assign{ margin:8px 12px 0; font-size:12px; padding:8px 11px; border-radius:9px; }
  .assign.has{ color:#3d5228; background:var(--okbg); border:1px solid var(--okline); }
  .assign.no{ color:var(--sub); background:#f1eee7; border:1px dashed var(--line); }
  .assign b{ color:#2f4020; }
  .prog{ display:flex; align-items:center; gap:8px; margin:10px 12px 0; font-size:11px; color:var(--sub); font-weight:700; }
  .bar{ flex:1; height:7px; border-radius:99px; background:var(--line); overflow:hidden; }
  .bar i{ display:block; height:100%; background:var(--ok); transition:width .25s; }

  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:10px 12px 90px; }
  .pc{ position:relative; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:7px;
    text-align:center; cursor:pointer; transition:transform .06s; }
  .pc:active{ transform:scale(.97); }
  .pc.done{ border-color:var(--accent); background:#fbf3ee; }
  .pc .th{ width:100%; height:88px; border-radius:8px; background:#ece7dc; object-fit:contain; display:block; margin-bottom:5px; }
  .pc .thx{ width:100%; height:88px; border-radius:8px; background:#ece7dc; display:flex; align-items:center;
    justify-content:center; color:var(--unset); font-size:10px; margin-bottom:5px; }
  .pc .nm{ font-size:11px; font-weight:500; line-height:1.3; height:43px; overflow:hidden; }
  .pc .pr{ font-size:11px; color:var(--ok); font-weight:700; margin-top:3px; }
  .pc .ck{ position:absolute; top:5px; right:5px; min-width:22px; height:22px; padding:0 6px; border-radius:99px;
    background:var(--accent); color:#fff; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; }
  .pc .val{ margin-top:4px; font-size:10px; font-weight:700; color:#fff; background:var(--unset);
    border-radius:99px; padding:1px 7px; display:inline-block; }
  .empty{ grid-column:1/-1; text-align:center; color:var(--sub); padding:40px 10px; font-size:13px; }

  .searchbar{ padding:10px 12px; }
  .searchbar input{ width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:10px; font-size:14px; background:var(--card); }

  .nav{ position:fixed; bottom:0; left:0; right:0; max-width:560px; margin:0 auto; display:flex;
    background:var(--card); border-top:1px solid var(--line); z-index:20; }
  .nav>div{ flex:1; text-align:center; padding:7px 2px 9px; font-size:10px; color:var(--sub); font-weight:700; cursor:pointer; }
  .nav>div .i{ font-size:18px; line-height:1.3; }
  .nav>div.on{ color:var(--accent); }

  .sheet{ position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:40; display:none; }
  .sheet.on{ display:block; }
  .sheet .box{ position:absolute; left:0; right:0; bottom:0; max-width:560px; margin:0 auto; background:var(--card);
    border-radius:16px 16px 0 0; padding:16px 16px 28px; }
  .sheet h3{ font-size:14px; margin-bottom:12px; }
  .sheet .row{ display:flex; gap:8px; margin-bottom:10px; }
  .sheet button{ flex:1; padding:12px; border:1px solid var(--line); border-radius:10px; background:var(--card);
    font-size:13px; font-weight:700; cursor:pointer; }
  .sheet button.p{ background:var(--accent); color:#fff; border-color:var(--accent); }
  .sheet .close{ width:100%; margin-top:6px; color:var(--sub); }

  .toast{ position:fixed; left:50%; bottom:70px; transform:translateX(-50%) translateY(20px); opacity:0;
    background:#2a2723; color:#fff; font-size:13px; padding:9px 16px; border-radius:99px; pointer-events:none;
    transition:.25s; z-index:60; }
  .toast.on{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<header>
  <div class="hd">
    <span class="ttl">仕入れラベル</span>
    <span class="sel" id="selbar"></span>
    <span class="menu" id="menuBtn" title="並び替え・名称編集">≡</span>
  </div>
  <div class="axis" id="axis"></div>
  <div class="editHint" id="editHint" style="display:none">✏️ 編集モード：ドラッグで並び替え・✕で削除・「＋追加」で新設</div>
</header>

<main id="main">
  <div class="tiles" id="tiles"></div>
  <div class="assign" id="assign"></div>
  <div class="prog" id="prog"><div class="bar"><i id="bar"></i></div><span id="progtxt"></span></div>
  <div class="searchbar" id="searchbar" style="display:none"><input id="q" placeholder="商品名で検索"></div>
  <div class="grid" id="grid"></div>
</main>

<div class="nav">
  <div class="on" data-tab="input"><div class="i">✏️</div>入力</div>
  <div data-tab="search"><div class="i">🔍</div>検索</div>
  <div data-tab="settings"><div class="i">⚙️</div>設定</div>
</div>

<div class="sheet" id="settingsSheet">
  <div class="box">
    <h3>設定 / バックアップ</h3>
    <div class="row"><button class="p" id="expBtn">📤 エクスポート</button><button id="impBtn">📥 インポート</button></div>
    <div class="row"><button id="statBtn">📊 付与状況</button></div>
    <input type="file" id="impFile" accept="application/json" style="display:none">
    <button class="close" id="setClose">閉じる</button>
  </div>
</div>

<div class="toast" id="toast"></div>

/* ---------- IndexedDB（既存アプリと同一スキーマ: 完全互換） ---------- */
const DB='stockLabelDB', V=3, STORE='labels';
const db = new Promise((rs,rj)=>{
  const r = indexedDB.open(DB,V);
  r.onupgradeneeded = e => { const d=e.target.result; if(!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE,{keyPath:'productId'}); };
  r.onsuccess = ()=>rs(r.result); r.onerror = ()=>rj(r.error);
});
const idbAll = async()=>{const d=await db;return new Promise((rs,rj)=>{const t=d.transaction(STORE,'readonly').objectStore(STORE).getAll();t.onsuccess=()=>rs(t.result||[]);t.onerror=()=>rj(t.error);});};
const idbPut = async x=>{const d=await db;return new Promise((rs,rj)=>{const t=d.transaction(STORE,'readwrite');t.objectStore(STORE).put(x);t.oncomplete=rs;t.onerror=()=>rj(t.error);});};
const idbDel = async id=>{const d=await db;return new Promise((rs,rj)=>{const t=d.transaction(STORE,'readwrite');t.objectStore(STORE).delete(id);t.oncomplete=rs;t.onerror=()=>rj(t.error);});};

/* ---------- 起動: IndexedDBに無ければ既存588ラベルをシード ---------- */
async function boot(){
  try{ const t=JSON.parse(localStorage.getItem(OPTS_KEY)); if(t&&t.store) tiles=t; }catch(e){}
  const rows = await idbAll();
  if(rows.length===0){
    // 初回のみ: 既存ラベル588件を1トランザクションで一括シード
    const d=await db;
    await new Promise((rs,rj)=>{ const t=d.transaction(STORE,'readwrite'); const os=t.objectStore(STORE);
      for(const id in SEED){ os.put(SEED[id]); labels[id]=SEED[id]; } t.oncomplete=rs; t.onerror=()=>rj(t.error); });
  } else {
    for(const r of rows) labels[r.productId]=r;
  }
  render();
}

function saveTiles(){ localStorage.setItem(OPTS_KEY, JSON.stringify(tiles)); }

async function setField(id,key,val){
  let cur = labels[id] || {productId:id,store:'',shelf:'',genre:'',note:'',updatedAt:0};
  if(cur[key]===val) cur[key]=''; else cur[key]=val;
  cur.updatedAt=now();
  labels[id]=cur;
  // 全フィールド空なら削除
  if(!cur.store && !cur.shelf && !cur.genre && !cur.note){ delete labels[id]; await idbDel(id); }
  else await idbPut(cur);
}

function renderAxisBar(){
  const bar=$('axis'); bar.innerHTML='';
  AXES.forEach((a,i)=>{
    const b=document.createElement('button');
    b.className='axbtn'+(i===axisIdx?' on':'');
    b.innerHTML=a.label+'<span class="cnt">'+countAssigned(a.key)+'/'+PRODUCTS.length+'</span>';
    b.onclick=()=>{ axisIdx=i; limit=PAGE; render(); };
    bar.appendChild(b);
  });
}

let dragName=null;
function renderTiles(){
  const key=curAxis().key, wrap=$('tiles'); wrap.innerHTML='';
  tiles[key].forEach(name=>{
    const t=document.createElement('div');
    t.className='tile'+(sel[key]===name?' sel':'')+(editMode?' wiggle':'');
    t.textContent=name;
    if(editMode){
      const x=document.createElement('span'); x.className='x'; x.textContent='×';
      x.onclick=e=>{ e.stopPropagation(); tiles[key]=tiles[key].filter(n=>n!==name); if(sel[key]===name)sel[key]=null; saveTiles(); render(); };
      t.appendChild(x);
      t.draggable=true;
      t.ondragstart=()=>{ dragName=name; };
      t.ondragover=e=>{ e.preventDefault(); t.classList.add('dragover'); };
      t.ondragleave=()=>t.classList.remove('dragover');
      t.ondrop=e=>{ e.preventDefault(); t.classList.remove('dragover'); reorder(key,dragName,name); };
    }
    t.onclick=()=> editMode ? null : (sel[key]= sel[key]===name?null:name, render());
    wrap.appendChild(t);
  });
  const add=document.createElement('div');
  add.className='tile add'; add.textContent='＋ 追加';
  add.onclick=()=>{ if(editMode) return; const v=prompt('新しい選択肢'); if(v&&!tiles[key].includes(v)){ tiles[key].unshift(v); saveTiles(); render(); } };
  wrap.appendChild(add);
}

function visibleProducts(){
  let list=PRODUCTS.slice();
  if(tab==='search' && qstr){ const q=qstr.toLowerCase(); list=list.filter(p=>(p.name||'').toLowerCase().includes(q)); }
  const key=curAxis().key;
  // 未割当を上に
  list.sort((a,b)=>{ const aa=labels[a.id]&&labels[a.id][key]?1:0; const bb=labels[b.id]&&labels[b.id][key]?1:0; return aa-bb; });
  return list;
}

function renderGrid(){
  const key=curAxis().key, val=sel[key], g=$('grid'); g.innerHTML='';
  const full=visibleProducts();
  if(full.length===0){ g.innerHTML='<div class="empty">該当なし</div>'; return; }
  const list=full.slice(0, limit);
  list.forEach(p=>{
    const lb=labels[p.id]||{};
    const on = lb[key] && lb[key]===val && val;
    const c=document.createElement('div');
    c.className='pc'+(on?' done':'');
    const img = p.img ? '<img class="th" src="'+p.img+'" loading="lazy">' : '<div class="thx">画像なし</div>';
    c.innerHTML=img+'<div class="nm">'+p.name+'</div><div class="pr">'+money(p.profit)+'</div>'
      + (on?'<div class="ck">✓</div>':'')
      + (lb[key]&&lb[key]!==val?'<div class="val">'+lb[key]+'</div>':'');
    c.onclick=async()=>{
      if(!val){ toast('先に上のタイルを選んでね'); return; }
      await setField(p.id,key,val); render();
    };
    g.appendChild(c);
  });
  if(full.length>limit){
    const more=document.createElement('div'); more.className='empty';
    more.innerHTML='<button style="padding:12px 22px;border:1px solid var(--line);border-radius:10px;background:var(--card);font-size:13px;font-weight:700;">もっと見る（残り'+(full.length-limit)+'件）</button>';
    more.querySelector('button').onclick=()=>{ limit+=80; renderGrid(); };
    g.appendChild(more);
  }
}

function reorder(key,from,to){
  if(!from||from===to) return;
  const arr=tiles[key], fi=arr.indexOf(from), ti=arr.indexOf(to);
  if(fi<0||ti<0) return;
  arr.splice(ti,0,arr.splice(fi,1)[0]); saveTiles(); render();
}

function render(){
  // タブ表示切替
  const isInput = tab!=='settings';
  $('searchbar').style.display = tab==='search' ? 'block':'none';
  $('axis').style.display = isInput?'flex':'none';
  $('tiles').style.display = isInput?'grid':'none';
  $('assign').style.display = isInput?'block':'none';
  $('prog').style.display = isInput?'flex':'none';
  document.querySelectorAll('.nav>div').forEach(d=>d.classList.toggle('on', d.dataset.tab===tab));
  if(tab==='settings'){ $('settingsSheet').classList.add('on'); }

  renderAxisBar(); renderTiles(); renderGrid();
  const key=curAxis().key, val=sel[key], done=countAssigned(key);
  const asg=$('assign');
  if(val){ asg.className='assign has'; asg.innerHTML='いま <b>'+val+'</b> を付けています — カードをタップで割当/解除'; }
  else { asg.className='assign no'; asg.textContent='上のタイルから場所/ジャンルを選んでください'; }
  $('bar').style.width=(done/PRODUCTS.length*100)+'%';
  $('progtxt').textContent=done+'/'+PRODUCTS.length;
  $('selbar').textContent = val ? curAxis().label+'：'+val : '';
}

/* ---------- タブ ---------- */
document.querySelectorAll('.nav>div').forEach(d=>{
  d.onclick=()=>{
    const t=d.dataset.tab;
    if(t==='settings'){ tab='settings'; $('settingsSheet').classList.add('on'); document.querySelectorAll('.nav>div').forEach(x=>x.classList.toggle('on',x.dataset.tab==='settings')); return; }
    tab=t; limit=PAGE; render();
  };
});
$('setClose').onclick=()=>{ $('settingsSheet').classList.remove('on'); tab='input'; render(); };
$('settingsSheet').onclick=e=>{ if(e.target===$('settingsSheet')){ $('settingsSheet').classList.remove('on'); tab='input'; render(); } };
$('q').oninput=e=>{ qstr=e.target.value; limit=PAGE; renderGrid(); };
$('menuBtn').onclick=()=>{ editMode=!editMode; $('editHint').style.display=editMode?'block':'none'; render(); };

/* ---------- エクスポート/インポート（PC⇔スマホ同期） ---------- */
$('expBtn').onclick=async()=>{
  const rows=await idbAll();
  const data={ version:1, exportedAt:now(), labels:rows, options:tiles };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='stock-label-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  toast('エクスポートしました');
};
$('impBtn').onclick=()=>$('impFile').click();
$('impFile').onchange=async e=>{
  const f=e.target.files[0]; if(!f) return;
  try{
    const j=JSON.parse(await f.text());
    const rows = Array.isArray(j)?j:(j.labels||[]);
    let n=0;
    for(const r of rows){ if(!r||!r.productId) continue; labels[r.productId]=r; await idbPut(r); n++; }
    if(j.options&&j.options.store){ tiles=j.options; saveTiles(); }
    toast(n+'件を取り込みました'); render();
  }catch(err){ toast('読み込み失敗: '+err.message); }
  e.target.value='';
};
$('statBtn').onclick=()=>{
  const s=countAssigned('store'), g=countAssigned('genre'), h=countAssigned('shelf');
  toast('店舗'+s+' / ジャンル'+g+' / 棚'+h+'（全'+PRODUCTS.length+'件）');
};

function toast(msg){ const t=$('toast'); t.textContent=msg; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),1600); }

boot();
</script>
</body>
</html>
