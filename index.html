<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>仕入れラベル</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    color-scheme: light only;
    --bg:#f7f5f0; --card:#fff; --ink:#2a2723; --sub:#8a8278;
    --line:#e6e1d6; --accent:#c8704b; --accent-d:#a85530; --warn:#c0392b;
    --unset:#b6ad9e; --ok:#6a9b46;
  }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    font-size:15px; line-height:1.5; }

  header { position:sticky; top:0; z-index:10; background:var(--bg);
    padding:14px 16px 8px; padding-top:calc(14px + env(safe-area-inset-top));
    border-bottom:1px solid var(--line); }
  .head-row { display:flex; align-items:center; justify-content:space-between; }
  h1 { margin:0; font-size:17px; font-weight:700; }
  h1 .n { color:var(--sub); font-weight:500; margin-left:6px; font-size:14px; }
  .menu-btn { background:none; border:none; font-size:22px; padding:4px 6px; cursor:pointer; color:var(--ink); }

  .search { width:100%; margin-top:10px; padding:10px 12px;
    border-radius:10px; border:1px solid var(--line); background:var(--card);
    font-size:15px; color:var(--ink); }
  .search:focus { outline:2px solid var(--accent); outline-offset:-1px; }

  .chips { display:flex; gap:6px; overflow-x:auto; padding:10px 16px 4px; scrollbar-width:none; }
  .chips::-webkit-scrollbar { display:none; }
  .chip { flex:0 0 auto; padding:6px 12px; border-radius:999px;
    border:1px solid var(--line); background:var(--card); color:var(--sub);
    font-size:13px; cursor:pointer; white-space:nowrap; }
  .chip.on { background:var(--ink); color:#fff; border-color:var(--ink); }
  .chip.unset.on { background:var(--warn); border-color:var(--warn); }
  .chip.genre.on { background:#4a6b73; border-color:#4a6b73; }
  .chip.shelf.on { background:#5a7340; border-color:#5a7340; }

  .facet { display:flex; gap:6px; margin-top:10px; }
  .facet button { flex:1; padding:8px 6px; border-radius:8px; border:1px solid var(--line);
    background:var(--card); color:var(--sub); font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
  .facet button.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  .more-btn { display:block; width:100%; padding:13px; margin:14px 0 4px; border-radius:10px;
    border:1px solid var(--line); background:var(--card); color:var(--accent-d);
    font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
  .more-btn:active { background:#ede8db; }

  main { padding:8px 12px 24px; }
  .group-title { font-size:12px; color:var(--sub); font-weight:600;
    margin:14px 4px 6px; }
  .list { display:grid; grid-template-columns:1fr; gap:8px; }
  .row { background:var(--card); border:1px solid var(--line); border-radius:10px;
    padding:10px 12px; display:flex; gap:12px; align-items:flex-start; }
  .row.set { border-left:4px solid var(--accent); padding-left:9px; }
  .thumb { flex:0 0 auto; width:260px; height:auto; max-height:320px;
    border-radius:8px; background:#ece7dc; object-fit:contain; cursor:pointer; }
  @media (max-width: 600px) {
    .thumb { width:160px; max-height:200px; }
  }
  .thumb.empty { display:flex; align-items:center; justify-content:center;
    color:var(--sub); font-size:10px; }
  .row .body { flex:1 1 auto; min-width:0; }
  .row .name { font-size:13px; font-weight:500; margin:0 0 4px; cursor:pointer;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; word-break:break-word; }
  .row .price { font-size:12px; color:var(--sub); margin-bottom:6px; }
  .row .price b { color:var(--ok); font-weight:700; }
  .tags { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
  .tag { font-size:11px; padding:2px 8px; border-radius:999px; background:#efeadd; color:var(--sub); white-space:nowrap; }
  .tag.genre { background:#e7eef0; color:#3f636b; }
  .tag.store { background:#f1e7e1; color:var(--accent-d); }
  .tag.shelf { background:#e9efe1; color:#516a37; }
  .tag.note { background:#f0ece2; color:#6b5d44; }
  .tag.subcat { background:#e8f0f7; color:#3a6d8c; }
  .actions { display:flex; flex-direction:column; gap:4px; align-items:flex-start; }
  .actions .qb {
    width:150px; padding:7px 12px; border-radius:6px; border:1px solid var(--line);
    background:var(--card); color:var(--ink); font-size:13px; cursor:pointer;
    font-family:inherit; line-height:1.2; text-align:left;
  }
  .actions .qb:hover { background:#ede8db; }
  .actions .qb:active { background:#e0d9c8; }
  .actions .qb.more { color:var(--sub); }
  .actions .set-badge {
    padding:5px 10px; border-radius:6px; background:var(--accent); color:#fff;
    font-size:12px; font-weight:600; display:inline-flex; gap:6px; align-items:center;
  }
  .actions .set-badge .x {
    background:rgba(255,255,255,.3); border:none; color:#fff; border-radius:50%;
    width:18px; height:18px; cursor:pointer; font-size:14px;
    display:flex; align-items:center; justify-content:center; line-height:1;
    padding:0;
  }
  .actions .set-badge .x:hover { background:rgba(255,255,255,.5); }
  .actions .change { padding:5px 10px; border-radius:6px; border:1px solid var(--line);
    background:var(--bg); color:var(--sub); font-size:12px; cursor:pointer; }

  .empty { text-align:center; padding:40px 20px; color:var(--sub); }
  .empty .em { font-size:32px; margin-bottom:6px; }

  .bg { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:100; display:none; }
  .bg.on { display:block; }
  .sheet { position:fixed; left:0; right:0; bottom:0; max-height:92dvh;
    background:var(--bg); border-radius:16px 16px 0 0; z-index:101;
    transform:translateY(100%); transition:transform .25s ease;
    display:flex; flex-direction:column;
    padding-bottom:env(safe-area-inset-bottom); }
  .sheet.on { transform:translateY(0); }
  .sh-head { display:flex; align-items:center; justify-content:space-between;
    padding:14px 16px; border-bottom:1px solid var(--line); }
  .sh-head h2 { margin:0; font-size:16px; font-weight:700; }
  .sh-head button { background:none; border:none; font-size:15px;
    color:var(--accent); cursor:pointer; padding:4px 8px; }
  .sh-body { padding:16px; overflow-y:auto; flex:1; }

  .target-name { background:var(--card); border:1px solid var(--line);
    border-radius:10px; padding:12px; font-size:14px; font-weight:600;
    margin-bottom:14px; word-break:break-word; line-height:1.5; }
  .target-source { font-size:11px; color:var(--sub); font-weight:400; margin-top:4px; }
  .target-source a { color:var(--sub); }

  label.f { display:block; margin-bottom:14px; }
  label.f .l { font-size:12px; color:var(--sub); margin-bottom:4px; font-weight:600; display:block; }
  label.f input { width:100%; padding:11px 12px; border-radius:8px;
    border:1px solid var(--line); background:var(--card);
    font-size:16px; color:var(--ink); font-family:inherit; }
  label.f input:focus { outline:2px solid var(--accent); outline-offset:-1px; }

  .genre-sel { width:100%; padding:11px 12px; border-radius:8px; border:1px solid var(--line);
    background:var(--card); font-size:16px; color:var(--ink); font-family:inherit; }
  .store-q { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  .store-q button { padding:7px 12px; border-radius:6px; border:1px solid var(--line);
    background:var(--card); font-size:13px; cursor:pointer; color:var(--ink); }
  .store-q button.sel { background:var(--ink); color:#fff; border-color:var(--ink); }
  /* 選択肢ボタンの編集（追加・並び替え・削除） */
  .optedit-toggle { margin-left:6px; font-size:11px; font-weight:600; font-family:inherit; cursor:pointer;
    color:var(--accent); background:var(--card); border:1px solid var(--line); border-radius:5px; padding:2px 8px; }
  .optedit-toggle.on { background:var(--accent); color:#fff; border-color:var(--accent); }
  .store-q.editing { flex-direction:column; align-items:stretch; }
  .store-q .opthint { font-size:11px; color:var(--sub); margin-bottom:4px; }
  .store-q .optrow { display:flex; align-items:center; gap:5px; }
  .store-q .optrow .grip { flex:0 0 auto; cursor:grab; color:var(--sub); font-size:16px; padding:0 2px; user-select:none; }
  .store-q .optrow.dragging { opacity:.45; }
  .store-q .optrow.dragover { outline:2px dashed var(--accent); outline-offset:-2px; border-radius:7px; }
  .store-q button.name { flex:1; text-align:left; cursor:default; background:var(--bg); }
  .store-q button.optctl { flex:0 0 auto; width:36px; padding:7px 0; text-align:center; font-size:14px; }
  .store-q button.optctl.rm { color:var(--warn); border-color:var(--warn); }
  .store-q .optadd { display:flex; gap:5px; margin-top:6px; }
  .store-q .optadd input { flex:1; padding:7px 10px; border-radius:6px; border:1px solid var(--line);
    background:var(--card); color:var(--ink); font-size:14px; font-family:inherit; }
  .store-q .optadd button { flex:0 0 auto; padding:7px 14px; border-radius:6px; border:1px solid var(--accent);
    background:var(--accent); color:#fff; font-size:13px; font-weight:600; }

  .save-btn { width:100%; padding:13px; border-radius:10px; border:none;
    background:var(--accent); color:#fff; font-size:16px; font-weight:700;
    cursor:pointer; margin-top:4px; }
  .save-btn:active { background:var(--accent-d); }
  .clear-btn { width:100%; padding:10px; border-radius:8px;
    border:1px solid var(--line); background:var(--card);
    color:var(--sub); font-size:13px; cursor:pointer; margin-top:8px; }

  .toast { position:fixed; left:50%; bottom:80px; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:8px;
    font-size:14px; opacity:0; pointer-events:none; transition:opacity .2s; z-index:200; }
  .toast.on { opacity:.95; }

  .menu-sheet button { width:100%; text-align:left; padding:14px;
    background:var(--card); border:1px solid var(--line); border-radius:8px;
    margin-bottom:8px; font-size:15px; color:var(--ink); cursor:pointer; }
  .menu-sheet .d { color:var(--sub); font-size:12px; margin-top:2px; }

  .json-view { background:var(--card); border:1px solid var(--line);
    border-radius:8px; padding:12px; font-family:ui-monospace,Consolas,monospace;
    font-size:12px; max-height:60vh; overflow:auto; white-space:pre-wrap;
    word-break:break-all; }

  .loading { text-align:center; padding:80px 20px; color:var(--sub); }
  .spin { display:inline-block; width:24px; height:24px; border:3px solid var(--line);
    border-top-color:var(--accent); border-radius:50%; animation:s 1s linear infinite; }
  @keyframes s { to { transform:rotate(360deg); } }

<header>
  <div class="head-row">
    <h1>仕入れラベル <span class="n" id="n"></span>
      <span id="syncBadge" style="font-size:11px; margin-left:8px; font-weight:500;"></span>
    </h1>
    <button class="menu-btn" id="menuBtn">⋯</button>
  </div>
  <div style="display:flex; gap:8px; margin-top:10px;">
    <input class="search" id="q" placeholder="商品名・店舗で検索" type="search" style="flex:1; margin-top:0;">
    <select id="sort" style="padding:10px 12px; border-radius:10px; border:1px solid var(--line); background:var(--card); font-size:14px; color:var(--ink); cursor:pointer; flex:0 0 auto;">
      <option value="newest">新しい順</option>
      <option value="store-group">店舗順（棚入力用）</option>
      <option value="roi">利益率 高い順</option>
      <option value="profit">利益額 高い順</option>
      <option value="cost-asc">仕入値 安い順</option>
      <option value="cost-desc">仕入値 高い順</option>
      <option value="sell-desc">販売価格 高い順</option>
    </select>
  </div>
  <div class="facet" id="facet">
    <button data-facet="store" class="on">🏬 店舗</button>
    <button data-facet="genre">🏷️ ジャンル</button>
    <button data-facet="shelf">📍 棚場所</button>
  </div>
</header>

<div class="chips" id="chips"></div>

<main>
  <div class="loading" id="loading"><div class="spin"></div><div style="margin-top:10px;">ブログ商品を読込中...</div></div>
  <div id="lists"></div>
  <div class="empty" id="empty" style="display:none;">
    <div class="em">🔍</div>
    <div>該当なし</div>
  </div>
</main>

<!-- 編集 -->
<div class="bg" id="formBg"></div>
<aside class="sheet" id="formSheet">
  <div class="sh-head">
    <button id="formCancel">キャンセル</button>
    <h2>ラベルをつける</h2>
    <button id="formSave" style="font-weight:700;">保存</button>
  </div>
  <div class="sh-body">
    <div class="target-name" id="targetName"></div>
    <label class="f">
      <span class="l">仕入れた店舗 <button type="button" class="optedit-toggle" data-group="store">✏ 編集</button></span>
      <div class="store-q" id="storeQ"></div>
      <input id="storeIn" placeholder="店舗名（例: ハードオフ青山店）">
    </label>
    <label class="f">
      <span class="l">仕入れた棚・場所 <button type="button" class="optedit-toggle" data-group="shelf">✏ 編集</button></span>
      <div class="store-q" id="shelfQ"></div>
      <input id="shelfIn" placeholder="棚・場所（例: ショーケース）">
    </label>
    <label class="f">
      <span class="l">商品ジャンル <span style="color:var(--sub);font-weight:400;">（自動判定・直せます）</span> <button type="button" class="optedit-toggle" data-group="genre">✏ 編集</button></span>
      <div class="store-q" id="genreQ"></div>
      <input id="genreIn" placeholder="ジャンル（打ち込むと絞り込み）">
    </label>
    <label class="f">
      <span class="l">サブカテゴリ <span style="color:var(--sub);font-weight:400;">（例：ぬいぐるみ／缶バッジ／アクスタ）</span> <button type="button" class="optedit-toggle" data-group="subcat">✏ 編集</button></span>
      <div class="store-q" id="subcatQ"></div>
      <input id="subcatIn" placeholder="サブカテゴリ（よく使うものは「✏ 編集」でボタン追加）">
    </label>
    <label class="f">
      <span class="l">備考 <button type="button" class="optedit-toggle" data-group="note">✏ 編集</button></span>
      <div class="store-q" id="noteQ"></div>
      <input id="noteIn" placeholder="備考（自由に入力。よく使うものは「✏ 編集」でボタン追加）">
    </label>
    <button class="save-btn" id="formSaveBig">保存</button>
    <button class="clear-btn" id="formClear">このラベルを全部外す</button>
  </div>
</aside>

<!-- メニュー -->
<div class="bg" id="menuBg"></div>
<aside class="sheet" id="menuSheet">
  <div class="sh-head">
    <button id="menuClose">閉じる</button>
    <h2>メニュー</h2>
    <span></span>
  </div>
  <div class="sh-body menu-sheet">
    <button id="showJson">
      📋 JSON 表示（Claude に貼る用）
      <div class="d">商品 × 店舗 × 棚 × ジャンル を JSON で表示・コピー</div>
    </button>
    <button id="dlJson">
      💾 JSON でダウンロード
      <div class="d">バックアップ用にファイル保存</div>
    </button>
    <button id="imJson">
      📥 ラベルの取り込み
      <div class="d">別端末のバックアップを読込</div>
    </button>
    <input type="file" id="imIn" accept=".json,application/json" style="display:none">
    <button id="reload">
      🔄 ブログ商品を再取得
      <div class="d">products.json をリロード（新しい記事追加時）</div>
    </button>
    <button id="clearAll" style="color:var(--warn); border-color:var(--warn);">
      ⚠️ つけたラベルを全削除
      <div class="d" style="color:var(--warn);">店舗・棚・ジャンル上書き / 取り消し不可</div>
    </button>
  </div>
</aside>

<!-- JSON表示 -->
<div class="bg" id="jsonBg"></div>
<aside class="sheet" id="jsonSheet">
  <div class="sh-head">
    <button id="jsonClose">閉じる</button>
    <h2>JSON</h2>
    <button id="jsonCopy" style="font-weight:700;">コピー</button>
  </div>
  <div class="sh-body">
    <div class="json-view" id="jsonView"></div>
  </div>
</aside>

<div class="toast" id="toast"></div>

// ---- IndexedDB (labels) ----
const DB='stockLabelApp', V=3, STORE='labels';
const db = new Promise((res, rej) => {
  const r = indexedDB.open(DB, V);
  r.onupgradeneeded = e => {
    const d = e.target.result;
    if (d.objectStoreNames.contains('items')) d.deleteObjectStore('items');
    if (d.objectStoreNames.contains('meta')) d.deleteObjectStore('meta');
    if (!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE, {keyPath:'productId'});
  };
  r.onsuccess = () => res(r.result);
  r.onerror = () => rej(r.error);
});
async function labelsAll() { const d=await db; return new Promise((rs,rj)=>{const t=d.transaction(STORE,'readonly').objectStore(STORE).getAll();t.onsuccess=()=>rs(t.result);t.onerror=()=>rj(t.error);});}
async function labelGet(id) { const d=await db; return new Promise((rs,rj)=>{const t=d.transaction(STORE,'readonly').objectStore(STORE).get(id);t.onsuccess=()=>rs(t.result);t.onerror=()=>rj(t.error);});}
async function labelPut(x) { const d=await db; return new Promise((rs,rj)=>{const t=d.transaction(STORE,'readwrite');t.objectStore(STORE).put(x);t.oncomplete=rs;t.onerror=()=>rj(t.error);});}
async function labelDel(id) { const d=await db; return new Promise((rs,rj)=>{const t=d.transaction(STORE,'readwrite');t.objectStore(STORE).delete(id);t.oncomplete=rs;t.onerror=()=>rj(t.error);});}
async function labelsClear() { const d=await db; return new Promise((rs,rj)=>{const t=d.transaction(STORE,'readwrite');t.objectStore(STORE).clear();t.oncomplete=rs;t.onerror=()=>rj(t.error);});}

  const subcat = (raw && Array.isArray(raw.subcat) && raw.subcat.length) ? [...raw.subcat] : [...OPT_DEFAULTS.subcat];

function optAdd(group, name) {
  name = (name || '').trim();
  if (!name || OPTS[group].includes(name)) return false; // 空・重複は追加しない

function optRemove(group, name) { OPTS[group] = OPTS[group].filter(x => x !== name); saveOpts(); }
function optMoveTop(group, name) { // ワンタップで一番上へ
  const arr = OPTS[group], i = arr.indexOf(name);
  if (i <= 0) return;
  arr.splice(i, 1); arr.unshift(name); saveOpts();
}
function optMoveBefore(group, moving, target) { // ドラッグ：moving を target の直前へ
  const arr = OPTS[group], mi = arr.indexOf(moving);
  if (mi < 0 || moving === target) return;
  arr.splice(mi, 1);

async function setField(productId, field, value) {
  const p = PRODUCTS.find(x => x.id === productId);
  const cur = { ...(LABELS.get(productId) || { productId }) };
  if (field === 'genre' && p && value === p.genre) value = ''; // 自動判定と同じなら上書き保存しない

const SERVER_URL = (location.protocol === 'http:' || location.protocol === 'https:')

async function serverSave(silent = false) {
  const labels = [...LABELS.values()];
  try {
    const r = await fetch(SERVER_URL, {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ labels }),

    if (!r.ok) throw new Error('HTTP ' + r.status);
    if (serverAvailable !== true) {

      updateSyncBadge();
      if (!silent) toast('サーバーに自動保存');

    return true;
  } catch (e) {
    if (serverAvailable !== false) {

      updateSyncBadge();

  }
}

async function seedIfEmpty(){
  try{ const c = await labelsAll(); if(c && c.length) return;   // 既にデータがあれば触らない
    for(const x of SEED_LABELS){ await labelPut(x); }
  }catch(e){ console.error('seed失敗', e); }
}
async function loadAll() {
  await seedIfEmpty();
  const cacheBust = Date.now();
  const data = window.__EMBEDDED_PRODUCTS__;
  PRODUCTS = data.products || [];

  // IDB のデータ（前のセッション or standalone.html 由来）
  const idbLabels = await labelsAll();
  const idbMap = new Map(idbLabels.map(l => [l.productId, l]));

  // サーバから現状の labels.json を取得（同一オリジン or http://localhost:8788）
  const SERVER_GET = SERVER_URL.replace('/labels', '/labels?_=' + cacheBust);
  let serverLabels = [];
  let serverOk = false;
  try {
    const r = await fetch(SERVER_GET);
    if (r.ok) { const d = await r.json(); serverLabels = d.labels || []; serverOk = true; }
  } catch {}

  if (serverOk) {
    serverAvailable = true;
    const merged = new Map(serverLabels.map(l => [l.productId, l]));
    let migrated = 0;
    for (const [k, v] of idbMap) {
      const existing = merged.get(k);
      if (!existing || (v.updatedAt || 0) > (existing.updatedAt || 0)) {
        merged.set(k, v);
        if (!existing) migrated++;
      }
    }
    LABELS = merged;
    if (migrated > 0) {
      await serverSave(true);
      setTimeout(() => toast(`IDBから${migrated}件をサーバーに同期`), 600);
    }
  } else {
    serverAvailable = false;
    LABELS = idbMap;
  }

  $('loading').style.display = 'none';
  updateSyncBadge();
  render();
}

// ---- render ----
let topStores = [...DEFAULT_STORES];
function render() {
  const valueOf = state.facet === 'store' ? storeOf : state.facet === 'shelf' ? shelfOf : genreOf;
  const facetClass = state.facet === 'genre' ? 'genre' : state.facet === 'shelf' ? 'shelf' : '';

  // アクティブ軸の値分布を集計
  const counts = {};
  let unsetCount = 0;
  for (const p of PRODUCTS) {
    const v = valueOf(p);
    if (state.facet !== 'genre' && !v) { unsetCount++; continue; }
    counts[v] = (counts[v] || 0) + 1;
  }
  const setCount = state.facet === 'genre' ? PRODUCTS.length : PRODUCTS.length - unsetCount;
  $('n').textContent = `(${setCount}/${PRODUCTS.length})`;

  const c = $('chips'); c.innerHTML = '';
  const add = (key, label, count, extraClass = '') => {
    const b = document.createElement('button');
    b.className = 'chip ' + extraClass + (state.filter === key ? ' on' : '');
    b.textContent = `${label} (${count})`;
    b.onclick = () => { state.filter = key; state.limit = PAGE; render(); window.scrollTo(0,0); };
    c.appendChild(b);
  };
  add('all', 'すべて', PRODUCTS.length, facetClass);
  if (state.facet !== 'genre') add('unset', '未設定', unsetCount, 'unset');
  let keys;
  if (state.facet === 'genre') keys = [...OPTS.genre.filter(g => counts[g]), ...Object.keys(counts).filter(k => k && !OPTS.genre.includes(k)).sort((a,b)=>counts[b]-counts[a])];
  else if (state.facet === 'shelf') keys = [...SHELVES.filter(s => counts[s]), ...Object.keys(counts).filter(k => !SHELVES.includes(k)).sort((a,b)=>counts[b]-counts[a])];
  else keys = Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(e=>e[0]);
  for (const k of keys) add(`${state.facet}:${k}`, k, counts[k], facetClass);

  // フィルタ
  const q = state.q.trim().toLowerCase();
  let filtered = PRODUCTS.filter(p => {
    const v = valueOf(p);
    if (state.filter === 'unset' && (state.facet === 'genre' || v)) return false;
    if (state.filter.includes(':')) {
      const want = state.filter.slice(state.filter.indexOf(':') + 1);
      if (v !== want) return false;
    }
    if (!q) return true;
    return (p.name||'').toLowerCase().includes(q)
      || storeOf(p).toLowerCase().includes(q)
      || shelfOf(p).toLowerCase().includes(q)
      || genreOf(p).toLowerCase().includes(q);
  });

  // ソート
  const noPriceLast = (x) => x == null ? -Infinity : x;
  if (state.sort === 'roi') { const mgn = p => (p.sell > 0 && p.profit != null) ? p.profit / p.sell * 100 : null; filtered.sort((a,b) => noPriceLast(mgn(b)) - noPriceLast(mgn(a))); }
  else if (state.sort === 'profit') filtered.sort((a,b) => noPriceLast(b.profit) - noPriceLast(a.profit));
  else if (state.sort === 'cost-asc') filtered.sort((a,b) => (a.cost == null ? Infinity : a.cost) - (b.cost == null ? Infinity : b.cost));
  else if (state.sort === 'cost-desc') filtered.sort((a,b) => noPriceLast(b.cost) - noPriceLast(a.cost));
  else if (state.sort === 'sell-desc') filtered.sort((a,b) => noPriceLast(b.sell) - noPriceLast(a.sell));
  // newest はデフォルトで products.json の順（pageId desc）に従う

  $('empty').style.display = filtered.length ? 'none' : 'block';

  const L = $('lists'); L.innerHTML = '';

  // newest だけページ別グルーピング、それ以外はフラット
  let groups;
  if (state.sort === 'newest') {
    groups = new Map();
    for (const p of filtered) {
      const k = p.source.pageId;
      if (!groups.has(k)) groups.set(k, { title: p.source.pageTitle, url: p.source.pageUrl, items: [] });
      groups.get(k).items.push(p);
    }
  } else if (state.sort === 'store-group') {
    // 店舗ごとにまとめる（棚を店舗順に入力する用）
    groups = new Map();
    for (const p of filtered) {
      const k = storeOf(p) || '（店舗未設定）';
      if (!groups.has(k)) groups.set(k, { title: `🏬 ${k}`, url: null, items: [] });
      groups.get(k).items.push(p);
    }
  } else {
    groups = new Map([['_', { title: null, url: null, items: filtered }]]);
  }
  let groupKeys;
  if (state.sort === 'newest') groupKeys = [...groups.keys()].sort((a,b) => b - a);
  else if (state.sort === 'store-group') groupKeys = [...groups.keys()].sort((a,b) => groups.get(b).items.length - groups.get(a).items.length);
  else groupKeys = ['_'];
  const LIMIT = state.limit || PAGE;
  let rendered = 0;
  for (const k of groupKeys) {
    if (rendered >= LIMIT) break;
    const g = groups.get(k);
    const slice = g.items.slice(0, LIMIT - rendered);
    if (g.title) {
      const t = document.createElement('div');
      t.className = 'group-title';
      t.innerHTML = esc(stripTitleHtml(g.title)) + ` <span style="color:var(--sub);">(${g.items.length})</span>`;
      L.appendChild(t);
    }
    const list = document.createElement('div');
    list.className = 'list';
    for (const p of slice) {
      const l = LABELS.get(p.id);
      const gv = genreOf(p), st = storeOf(p), sh = shelfOf(p), no = noteOf(p), sc = subcatOf(p);
      const row = document.createElement('div');
      row.className = 'row' + (l ? ' set' : '');
      const thumb = p.img
        ? `<img class="thumb" src="${esc(p.img)}" loading="lazy" decoding="async" alt="">`
        : `<div class="thumb empty">No Image</div>`;

      // タグ: ジャンルは常時、店舗・棚は設定時のみ
      let tagsHtml = `<span class="tag genre">${esc(gv)}</span>`;
      if (st) tagsHtml += `<span class="tag store">🏬${esc(st)}</span>`;
      if (sh) tagsHtml += `<span class="tag shelf">📍${esc(sh)}</span>`;
      if (sc) tagsHtml += `<span class="tag subcat">🏷${esc(sc)}</span>`;
      if (no) tagsHtml += `<span class="tag note">📝${esc(no)}</span>`;

      // アクション: アクティブ軸に応じてクイック操作を出し分け
      let actionsHtml;
      if (state.facet === 'genre') {
        actionsHtml = `<button class="change" data-act="open" data-id="${esc(p.id)}">ジャンル変更</button>`;
      } else {
        const field = state.facet;
        const cur = field === 'store' ? st : sh;
        if (cur) {
          actionsHtml = `
            <span class="set-badge">${esc(cur)}<button class="x" data-act="clearfield" data-id="${esc(p.id)}" data-field="${field}" title="外す">×</button></span>
            <button class="change" data-act="open" data-id="${esc(p.id)}">変更</button>`;
        } else {
          const opts = (field === 'store' ? OPTS.store : OPTS.shelf).slice(0, INLINE_STORE_COUNT);
          const buttons = opts.map(s =>
            `<button class="qb" data-act="setfield" data-id="${esc(p.id)}" data-field="${field}" data-val="${esc(s)}">${esc(s)}</button>`
          ).join('');
          actionsHtml = `${buttons}<button class="qb more" data-act="open" data-id="${esc(p.id)}">他...</button>`;
        }
      }
      // 価格情報
      let priceHtml = '';
      if (p.profit != null) {
        const fmt = n => n != null ? '¥' + n.toLocaleString() : '-';
        const mgn = (p.sell > 0 && p.profit != null) ? Math.round(p.profit / p.sell * 100) : null;
        priceHtml = `<div class="price">利益<b>${fmt(p.profit)}</b>${mgn != null ? `（利益率${mgn}%）` : ''} ／ 売${fmt(p.sell)} 仕${fmt(p.cost)} 送${fmt(p.ship)}</div>`;
      }
      row.innerHTML = `
        ${thumb.replace('<img', '<img data-act="open" data-id="' + esc(p.id) + '"').replace('<div class="thumb empty">', '<div class="thumb empty" data-act="open" data-id="' + esc(p.id) + '">')}
        <div class="body">
          <div class="name" data-act="open" data-id="${esc(p.id)}">${esc(p.name)}</div>
          ${priceHtml}
          <div class="tags">${tagsHtml}</div>
          <div class="actions">${actionsHtml}</div>
        </div>
      `;
      list.appendChild(row);
    }
    L.appendChild(list);
    rendered += slice.length;
  }
  if (rendered < filtered.length) {
    const more = document.createElement('button');
    more.className = 'more-btn';
    more.textContent = `▼ もっと見る（残り ${filtered.length - rendered} 件）`;
    more.onclick = () => { state.limit = (state.limit || PAGE) + 100; render(); };
    L.appendChild(more);
  }
}

function stripTitleHtml(s) {
  return String(s || '').replace(/<[^>]+>/g, '').replace(/&amp;/g, '&').replace(/&nbsp;/g, ' ');
}

function close(id) { $(id+'Bg').classList.remove('on'); $(id+'Sheet').classList.remove('on'); }

// 選択肢ボタンの編集モード（グループ別）。普段はfalse（タップ＝選択のまま）
const pickerEdit = { store:false, shelf:false, genre:false };
let genreSelVal = ''; // ジャンルの選択値。保存時に使う／編集モードでも保持する
let dragName = null;  // ドラッグ並び替え中のボタン名

// グループ（store/shelf/genre）の選択肢ボタンを描く。
//  普段＝タップで選択。編集モード＝各ボタンに ▲▼（並び替え）・✕（削除）＋末尾に追加欄。
function renderPicker(group) {
  const container = $(group + 'Q');
  const input = $(group + 'In');
  const isGenre = group === 'genre';
  const editing = pickerEdit[group];
  container.innerHTML = '';
  container.classList.toggle('editing', editing);

  const curVal = isGenre ? genreSelVal : input.value.trim();
  // ユーザーが決めた並び。一覧に無い現在値（自動判定ジャンル等）は消さず先頭に出す
  let opts = [...OPTS[group]];
  if (isGenre && curVal && !opts.includes(curVal)) opts = [curVal, ...opts];
  const q = (isGenre && !editing) ? input.value.trim() : '';

  if (editing) {
    const hint = document.createElement('div');
    hint.className = 'opthint';
    hint.textContent = 'ドラッグで並び替え ／ ⤒＝一番上へ ／ ✕＝削除';
    container.appendChild(hint);
  }

  opts.forEach((name, idx) => {
    const b = document.createElement('button');
    b.type = 'button';
    b.textContent = name;
    if (curVal && name === curVal) b.classList.add('sel');

    if (!editing) {
      if (isGenre) { // 検索フィルタ：上位8＋選択中＋打ち込み一致だけ表示
        const match = !q || name.includes(q);
        b.style.display = (q ? match : (idx < 8 || b.classList.contains('sel'))) ? '' : 'none';
      }
      b.onclick = () => {
        if (isGenre) { genreSelVal = (genreSelVal === name) ? '' : name; input.value = ''; }
        else { input.value = (input.value.trim() === name) ? '' : name; } // 再タップで解除
        renderPicker(group);
      };
      container.appendChild(b);
    } else {
      b.className = 'name';
      const row = document.createElement('span');
      row.className = 'optrow';
      row.draggable = true;
      row.ondragstart = e => { dragName = name; row.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; try { e.dataTransfer.setData('text/plain', name); } catch {} };
      row.ondragend = () => { dragName = null; renderPicker(group); };
      row.ondragover = e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; if (dragName && dragName !== name) row.classList.add('dragover'); };
      row.ondragleave = () => row.classList.remove('dragover');
      row.ondrop = e => { e.preventDefault(); if (dragName) optMoveBefore(group, dragName, name); dragName = null; renderPicker(group); };
      const grip = document.createElement('span'); grip.className = 'grip'; grip.textContent = '⠿';
      row.appendChild(grip);
      const top = mkCtl('⤒', () => { optMoveTop(group, name); renderPicker(group); }); top.title = '一番上へ';
      row.appendChild(top);
      row.appendChild(b);
      const rm = mkCtl('✕', () => {
        if (isGenre && genreSelVal === name) genreSelVal = '';
        optRemove(group, name); renderPicker(group);
      });
      rm.classList.add('rm');
      row.appendChild(rm);
      container.appendChild(row);
    }
  });

  if (editing) {
    const addRow = document.createElement('span');
    addRow.className = 'optadd';
    const ai = document.createElement('input');
    ai.type = 'text'; ai.placeholder = '新しい選択肢を追加';
    const ab = document.createElement('button');
    ab.type = 'button'; ab.textContent = '＋追加';
    const doAdd = () => { if (optAdd(group, ai.value)) renderPicker(group); else toast('追加できません（空 or 重複）'); };
    ab.onclick = doAdd;
    ai.onkeydown = e => { if (e.key === 'Enter') { e.preventDefault(); doAdd(); } };
    addRow.appendChild(ai); addRow.appendChild(ab);
    container.appendChild(addRow);
  }
}
function mkCtl(txt, fn) {
  const b = document.createElement('button');
  b.type = 'button'; b.className = 'optctl'; b.textContent = txt; b.onclick = fn;
  return b;
}

async function openForm(productId) {
  const p = PRODUCTS.find(x => x.id === productId);
  if (!p) return;
  state.editId = productId;
  const l = LABELS.get(productId);

  $('targetName').innerHTML = `${esc(p.name)}<div class="target-source">出典: <a href="${esc(p.source.pageUrl)}" target="_blank" rel="noopener">${esc(stripTitleHtml(p.source.pageTitle))}</a></div>`;

  // 編集モードは毎回オフで開く（普段＝タップで選択。「✏ 編集」で並び替え/追加/削除）
  pickerEdit.store = pickerEdit.shelf = pickerEdit.genre = pickerEdit.subcat = pickerEdit.note = false;
  document.querySelectorAll('.optedit-toggle').forEach(t => { t.textContent = '✏ 編集'; t.classList.remove('on'); });

  $('storeIn').value = l?.store || '';
  renderPicker('store');

  $('shelfIn').value = l?.shelf || '';
  renderPicker('shelf');

  genreSelVal = genreOf(p) || '';   // 現ジャンル（自動判定 or 上書き）

  $('genreIn').oninput = () => renderPicker('genre');
  renderPicker('genre');

  $('subcatIn').value = l?.subcat || '';
  renderPicker('subcat');

  $('noteIn').value = l?.note || '';
  renderPicker('note');

  open('form');
  const focusId = state.facet === 'shelf' ? 'shelfIn' : 'storeIn';
  setTimeout(() => $(focusId).focus({ preventScroll: true }), 100);
}

async function saveLabel() {
  const p = PRODUCTS.find(x => x.id === state.editId);
  const store = $('storeIn').value.trim();
  const shelf = $('shelfIn').value.trim();
  const note = $('noteIn').value.trim();
  const subcat = $('subcatIn').value.trim();
  const genreSel = genreSelVal || '';
  const cur = { productId: state.editId, updatedAt: Date.now() };
  if (store) cur.store = store;
  if (shelf) cur.shelf = shelf;
  if (subcat) cur.subcat = subcat;
  if (note) cur.note = note;
  if (p && genreSel && genreSel !== p.genre) cur.genre = genreSel; // 自動判定と違う時だけ上書き保存
  if (cur.store || cur.shelf || cur.genre || cur.subcat || cur.note) {
    await labelPut(cur); LABELS.set(state.editId, cur);
  } else {
    await labelDel(state.editId); LABELS.delete(state.editId);
  }
  await serverSave();
  close('form');
  toast('保存しました');
  render();
}
// 「✏ 編集」トグル：押すとそのグループだけ並び替え/追加/削除モードに
document.querySelectorAll('.optedit-toggle').forEach(btn => {
  btn.onclick = () => {
    const g = btn.dataset.group;
    pickerEdit[g] = !pickerEdit[g];
    btn.textContent = pickerEdit[g] ? '完了' : '✏ 編集';
    btn.classList.toggle('on', pickerEdit[g]);
    renderPicker(g);
  };
});
$('formCancel').onclick = () => close('form');
$('formBg').onclick = () => close('form');
$('formSave').onclick = saveLabel;
$('formSaveBig').onclick = saveLabel;
$('formClear').onclick = async () => {
  if (!state.editId) return;
  await labelDel(state.editId);
  LABELS.delete(state.editId);
  await serverSave();
  close('form');
  toast('ラベルを外しました');
  render();
};

// ---- menu ----
$('menuBtn').onclick = () => open('menu');
$('menuClose').onclick = () => close('menu');
$('menuBg').onclick = () => close('menu');

function buildExport() {
  return {
    exportedAt: new Date().toISOString(),
    options: OPTS, // 自分で追加・並び替えた選択肢ボタンも一緒にバックアップ
    items: PRODUCTS.map(p => {
      const l = LABELS.get(p.id);
      return {
        name: p.name,
        genre: genreOf(p),
        store: l?.store || null,
        shelf: l?.shelf || null,
        subcat: l?.subcat || null,
        note: l?.note || null,
        profit: p.profit ?? null,
        roi: p.roi ?? null,
        labeledAt: l ? new Date(l.updatedAt).toISOString() : null,
        source: { pageId: p.source.pageId, pageTitle: stripTitleHtml(p.source.pageTitle), pageUrl: p.source.pageUrl },
      };
    }),
  };
}

$('showJson').onclick = () => {
  const data = buildExport();
  // 手でラベル（店舗 or 棚）を付けたものだけ抜き出して見やすく
  data.items = data.items.filter(x => x.store || x.shelf);
  $('jsonView').textContent = JSON.stringify(data, null, 2);
  close('menu');
  open('json');
};
$('jsonClose').onclick = () => close('json');
$('jsonBg').onclick = () => close('json');
$('jsonCopy').onclick = async () => {
  try { await navigator.clipboard.writeText($('jsonView').textContent); toast('コピー完了'); }
  catch { toast('コピー失敗'); }
};

$('dlJson').onclick = () => {
  const blob = new Blob([JSON.stringify(buildExport(), null, 2)], { type:'application/json' });
  const u = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = u; a.download = `stock-label-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(u);
  close('menu');
  toast('ダウンロード完了');
};

$('imJson').onclick = () => $('imIn').click();
$('imIn').onchange = async e => {
  const f = e.target.files[0]; if (!f) return;
  try {
    const data = JSON.parse(await f.text());
    // 選択肢ボタンの並びも復元（あれば）
    if (data && data.options && (Array.isArray(data.options.store) || Array.isArray(data.options.shelf) || Array.isArray(data.options.genre) || Array.isArray(data.options.subcat) || Array.isArray(data.options.note))) {
      const o = data.options, pick = k => Array.isArray(o[k]) ? [...o[k]] : (OPTS[k] || []);
      OPTS = { store:pick('store'), shelf:pick('shelf'), genre:pick('genre'), subcat:pick('subcat'), note:pick('note') };
      saveOpts();
    }
    const items = Array.isArray(data) ? data : data.items;
    if (!Array.isArray(items)) throw new Error('items 配列がない');
    let n = 0;
    for (const it of items) {
      // 商品名で products.json から照合
      const match = PRODUCTS.find(p => p.name === it.name);
      if (!match) continue;
      const cur = { ...(LABELS.get(match.id) || { productId: match.id }) };
      if (it.store) cur.store = it.store;
      if (it.shelf) cur.shelf = it.shelf;
      if (it.subcat) cur.subcat = it.subcat;
      if (it.note) cur.note = it.note;
      if (it.genre && it.genre !== match.genre) cur.genre = it.genre;
      if (!(cur.store || cur.shelf || cur.genre || cur.subcat || cur.note)) continue;
      cur.updatedAt = Date.now();
      await labelPut(cur);
      LABELS.set(match.id, cur);
      n++;
    }
    await serverSave();
    close('menu');
    toast(`${n}件 反映`);
    render();
  } catch (err) { toast('読込失敗: ' + err.message); }
  e.target.value = '';
};

$('reload').onclick = async () => {
  $('loading').style.display = 'block';
  $('lists').innerHTML = '';
  close('menu');
  try { await loadAll(); toast('再取得しました'); }
  catch (err) { toast('再取得失敗: ' + err.message); }
};

$('clearAll').onclick = async () => {
  if (!confirm('店舗ラベルを全削除します。商品リストは消えません。続行？')) return;
  await labelsClear();
  LABELS.clear();
  await serverSave();
  close('menu');
  toast('全削除');
  render();
};

// ---- core ----
$('q').oninput = e => { state.q = e.target.value; state.limit = PAGE; render(); };
$('sort').onchange = e => { state.sort = e.target.value; state.limit = PAGE; render(); window.scrollTo(0,0); };

// 軸トグル（店舗 / ジャンル / 棚場所）: 絞り込みチップも行内ボタンもこの軸に切替わる
$('facet').addEventListener('click', e => {
  const b = e.target.closest('button[data-facet]');
  if (!b) return;
  state.facet = b.dataset.facet;
  state.filter = state.facet === 'genre' ? 'all' : 'unset';
  state.limit = PAGE;
  // 棚場所モードは「店舗順」に自動切替（店舗ごとにまとまった並びのまま棚を入力する運用）
  if (state.facet === 'shelf') { state.sort = 'store-group'; $('sort').value = 'store-group'; }
  $('facet').querySelectorAll('button').forEach(x => x.classList.toggle('on', x === b));
  render(); window.scrollTo(0,0);
});

// イベント委譲: インラインの 1タップ保存
document.getElementById('lists').addEventListener('click', async (e) => {
  const t = e.target.closest('[data-act]');
  if (!t) return;
  const act = t.dataset.act;
  const id = t.dataset.id;
  if (act === 'setfield') {
    await setField(id, t.dataset.field, t.dataset.val);
    render();
  } else if (act === 'clearfield') {
    e.stopPropagation();
    await setField(id, t.dataset.field, '');
    render();
  } else if (act === 'open') {
    openForm(id);
  }
});

let tt;
function toast(m) {
  const t = $('toast'); t.textContent = m; t.classList.add('on');
  clearTimeout(tt); tt = setTimeout(() => t.classList.remove('on'), 2000);
}



loadAll().catch(err => {
  $('loading').innerHTML = '<div style="color:var(--warn)">読込失敗: ' + esc(err.message) + '</div>';
});
</script>
</body>
</html>
